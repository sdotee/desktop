name: Release Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

env:
  APP_NAME: see

jobs:
  build:
    name: Build Unsigned APK
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION_NUMBER="${VERSION#v}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "number=${VERSION_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Build release APK
        working-directory: android
        run: gradle :app:assembleRelease --no-daemon

      - name: Rename artifacts
        working-directory: android
        run: |
          VERSION_NUMBER="${{ steps.version.outputs.number }}"
          mkdir -p ../release
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             ../release/${{ env.APP_NAME }}-${VERSION_NUMBER}-unsigned.apk

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS-android
          cat SHA256SUMS-android

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: S.EE Desktop ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: false
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
