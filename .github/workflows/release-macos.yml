name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v1.0.2)'
        required: true

env:
  APP_NAME: SEE
  SCHEME: SEE
  XCODE_PROJECT: macos/SEE.xcodeproj
  SPARKLE_VERSION: 2.9.1
  DMGMAKER_REPO: https://github.com/saihgupr/DMGMaker.git
  DMGMAKER_COMMIT: 9e17aec84483938d154ce159ded8ce641379d5aa

jobs:
  build-and-release:
    name: Build, Sign, Notarize & Release
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION_NUMBER="${VERSION#v}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "number=${VERSION_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import Apple certificate into temporary keychain
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Download Sparkle CLI tools
        run: |
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          xattr -dr com.apple.quarantine "$RUNNER_TEMP/sparkle" || true
          echo "SPARKLE_BIN=$RUNNER_TEMP/sparkle/bin" >> "$GITHUB_ENV"

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm"

      - name: Inject Sparkle public key into Info.plist
        env:
          SPARKLE_ED25519_PUBLIC_KEY: ${{ secrets.SPARKLE_ED25519_PUBLIC_KEY }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :SUPublicEDKey ${SPARKLE_ED25519_PUBLIC_KEY}" macos/SEE/Info.plist

      - name: Archive (Release)
        run: |
          VERSION_NUMBER="${{ steps.version.outputs.number }}"
          BUILD_NUMBER="${{ github.run_number }}"

          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/SEE.xcarchive" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm" \
            MARKETING_VERSION="$VERSION_NUMBER" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime" \
            ONLY_ACTIVE_ARCH=NO

      - name: Export archive (developer-id)
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/SEE.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Notarize .app and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$RUNNER_TEMP/export/SEE.app"
          APP_ZIP="$RUNNER_TEMP/SEE.app.zip"

          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"

          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Setup DMGMaker
        run: |
          DMGMAKER_DIR="$RUNNER_TEMP/DMGMaker"
          git clone "$DMGMAKER_REPO" "$DMGMAKER_DIR"
          git -C "$DMGMAKER_DIR" checkout --detach "$DMGMAKER_COMMIT"
          echo "DMGMAKER_DIR=${DMGMAKER_DIR}" >> "$GITHUB_ENV"

      - name: Cache DMGMaker build
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/DMGMaker/.build
          key: dmgmaker-${{ env.DMGMAKER_COMMIT }}-${{ runner.os }}-${{ runner.arch }}

      - name: Create DMG
        run: |
          VERSION_NUMBER="${{ steps.version.outputs.number }}"
          DMG_NAME="SEE-${VERSION_NUMBER}.dmg"
          DMG_PATH="$RUNNER_TEMP/${DMG_NAME}"
          APP_PATH="$RUNNER_TEMP/export/SEE.app"

          ( cd "$DMGMAKER_DIR" && swift run -c release "DMG Maker" \
              --app "$APP_PATH" --name "S.EE" )

          # DMGMaker writes <name>.dmg next to the input .app; rename to versioned filename.
          mv "$RUNNER_TEMP/export/S.EE.dmg" "$DMG_PATH"

          echo "DMG_PATH=${DMG_PATH}" >> "$GITHUB_ENV"
          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Codesign DMG
        run: |
          codesign --sign "Developer ID Application" --timestamp "$DMG_PATH"

      - name: Notarize DMG and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Generate SHA256 checksum
        run: |
          cd "$RUNNER_TEMP"
          shasum -a 256 "$DMG_NAME" > "${DMG_NAME}.sha256"
          cat "${DMG_NAME}.sha256"

      - name: Sign Sparkle update
        id: sparkle
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          KEY_FILE="$RUNNER_TEMP/sparkle_priv.key"
          # Strip any trailing newline so sign_update sees a clean base64 string.
          printf '%s' "$SPARKLE_ED25519_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          trap 'rm -f "$KEY_FILE"' EXIT

          SIGN_OUTPUT=$("$SPARKLE_BIN/sign_update" -f "$KEY_FILE" "$DMG_PATH")
          SIGNATURE=$(printf '%s' "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          if [ -z "$SIGNATURE" ]; then
            echo "ERROR: failed to extract sparkle:edSignature" >&2
            echo "$SIGN_OUTPUT" >&2
            exit 1
          fi
          DMG_SIZE=$(stat -f%z "$DMG_PATH")
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"
          echo "size=${DMG_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: S.EE ${{ steps.version.outputs.tag }} (macOS)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: false
          files: |
            ${{ runner.temp }}/${{ env.DMG_NAME }}
            ${{ runner.temp }}/${{ env.DMG_NAME }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout main for appcast update
        uses: actions/checkout@v6
        with:
          ref: main
          path: main-checkout
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update macos/appcast.xml on main
        if: ${{ !contains(steps.version.outputs.tag, '-') }}
        env:
          VERSION_NUMBER: ${{ steps.version.outputs.number }}
          TAG: ${{ steps.version.outputs.tag }}
          BUILD_NUMBER: ${{ github.run_number }}
          SIGNATURE: ${{ steps.sparkle.outputs.signature }}
          DMG_SIZE: ${{ steps.sparkle.outputs.size }}
          REPO: ${{ github.repository }}
        run: |
          cd main-checkout
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${DMG_NAME}"
          PUB_DATE=$(date -R)

          NEW_ITEM=$(cat <<XML
              <item>
                <title>Version ${VERSION_NUMBER}</title>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION_NUMBER}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure url="${DOWNLOAD_URL}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${DMG_SIZE}"
                  type="application/octet-stream" />
              </item>
          XML
          )

          # Insert new item right after the <language> tag (so newest is first).
          python3 - <<PY
          import re, pathlib
          path = pathlib.Path("macos/appcast.xml")
          xml = path.read_text()
          item = """${NEW_ITEM}"""
          new_xml = re.sub(
              r"(<language>en</language>)",
              r"\1\n" + item,
              xml,
              count=1,
          )
          path.write_text(new_xml)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macos/appcast.xml
          git commit -m "chore(appcast): add ${TAG}"
          git push origin main

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
